name: execution_failure_logging
description: 실행 실패/타임아웃을 감지해 .project/log.md에 기록하고 실패 처리한다.
rule:
  - 실패 또는 timeout은 재시도 없이 로그를 남기고 실패 처리해야 한다.
features:
  domain:
    - task_execution
task:
  - name: detect_execution_failure_or_timeout
    type: action
    domain:
      - task_execution
    depends_on: []
    scope:
      - src/main.rs
      - src/config/mod.rs
    rule:
      - timeout 기준은 실행 설정값을 따른다.
    step:
      - 실행 결과 입력 -> 실패/timeout 판정 -> 실패 이벤트 생성
  - name: append_failure_log_entry
    type: action
    domain:
      - task_execution
    depends_on:
      - detect_execution_failure_or_timeout
    scope:
      - .project/log.md
      - src/main.rs
    rule:
      - 로그 항목은 task 이름/실패 시각/실패 사유를 포함해야 한다.
    step:
      - 실패 이벤트 입력 -> markdown 로그 라인 append -> task 상태 failed로 확정
