name: draft_lifecycle_management
description: 기능 draft를 생성/추가/삭제하고 feature별 draft.yaml 저장을 관리한다.
rule:
  - draft는 템플릿 형식을 따라 기능 단위 파일로 저장해야 한다.
features:
  domain:
    - draft
    - project
task:
  - name: resolve_feature_draft_path
    type: action
    domain:
      - draft
      - project
    depends_on: []
    scope:
      - .project/features/work
      - src/ui/mod.rs
    rule:
      - draft 저장 위치는 .project/features/work/<feature>/draft.yaml 이어야 한다.
    step:
      - feature 이름 입력 -> 저장 경로 계산 및 폴더 준비 -> draft 대상 경로 반환
  - name: apply_draft_create_update_delete
    type: action
    domain:
      - draft
    depends_on:
      - resolve_feature_draft_path
    scope:
      - src/assets/templates/draft.yaml
      - .project/features/work
      - src/ui/mod.rs
    rule:
      - 삭제 동작은 y/n 확인 후 반영한다.
    step:
      - draft 명령 입력(create/add/delete) -> 템플릿 기반 파일 생성/수정/삭제 -> 목록 갱신
