rule:
  - depends_on 미완료 task는 실행하지 않는다.
  - 실패/timeout task는 재시도 없이 .project/log.md에 기록한다.
features:
  domain:
    - task_execution
    - workspace_ui
task:
  - name: parallel_build_code
    type: action
    domain:
      - task_execution
      - workspace_ui
    depends_on:
      - draft_codex_flow
    scope:
      - src/main.rs
      - src/config/mod.rs
      - src/ui/mod.rs
      - src/assets/templates/prompts/tasks.txt
      - config.yaml
    rule:
      - 병렬 실행 수는 config.yaml의 max_parallel 기본값 10을 사용한다.
      - codex 실행 시 자동 y 옵션을 포함한다.
    step:
      - .project/project.md를 읽고 # info 섹션만 추출한다.
      - .project/feature 하위 폴더를 읽고 draft.yaml 또는 drafts.yaml을 task 객체로 수집한다.
      - depends_on을 검사해 실행 가능한 task만 tokio semaphore(max_parallel)로 병렬 실행한다.
      - task 상태 inactive/active/clear를 실시간 문자열로 렌더링한다.
      - run_parallel_build_code 명령을 제공하고 templates/prompts/tasks.txt 형식으로 codex exec를 호출한다.
