name: project_cli_lifecycle
description: 프로젝트 생성/추가/삭제/선택 CLI를 제공하고 project 목록을 관리한다.
rule:
  - CLI 명령어를 제공해서 파이프라인으로 사용 가능해야 한다.
features:
  domain:
    - project
task:
  - name: load_project_registry
    type: action
    domain:
      - project
    depends_on: []
    scope:
      - configs/project.yaml
      - src/main.rs
      - src/ui/mod.rs
    rule:
      - 프로젝트 목록은 이름/생성일/최근수정일/설명을 보여줘야 한다.
    step:
      - configs/project.yaml 입력 -> 프로젝트 목록 모델 로드 -> UI/CLI 목록 출력 상태 갱신
  - name: execute_project_cli_actions
    type: action
    domain:
      - project
    depends_on:
      - load_project_registry
    scope:
      - src/main.rs
      - src/ui/mod.rs
      - configs/project.yaml
      - .project/project.md
    rule:
      - 프로젝트 생성 시 .project 경로가 있으면 기존 프로젝트로 로드한다.
    step:
      - CLI 입력(create/add/select/delete) -> registry 반영 및 .project 처리 -> 결과 메시지 출력
