draft:
- name: 'workspace_bootstrap: 루트 경로 확인, 최소 파일 구조(index.html, styles.css, script.js, 검증 문서) 준비, 실행/검증 명령 정의'
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - 루트 경로 /home/tree/project/rust-orc/.tmp_tmux_test 기준으로 정적 랜딩 페이지 최소 자산 ./index.html, ./styles.css, ./script.js와 tmux 검증 절차 문서 ./tmux_split_verification.md를 준비한다.
  - 단일 페이지 학교 랜딩 구조(헤더, 소개, 핵심 정보, CTA), 기본 반응형 스타일, 핵심 상호작용 JavaScript를 브라우저 기본 환경에서 동작하도록 연결한다.
  - 프로젝트 루트에서 반복 실행 가능한 tmux 2-pane 분할 검증 명령과 성공/실패 판정 기준을 문서와 실행 순서에 일치시킨다.
  rule:
  - 루트 경로는
  - 초기 파일 구조는 랜딩 페이지 실행에 필요한 최소 구성만 포함한다.
  - 검증 절차는 순서 의존성이 드러나도록 단계형으로 유지한다.
  - 문서와 코드의 명령, 파일명, 실행 순서는 서로 일치해야 한다.
  - 검증 단계는 수동 추측이 아닌 실행 가능한 명령 기준으로 작성한다.
  - 프로젝트 경로 기준 상대 경로를 우선 사용하고 경로 표기는 일관되게 유지한다.
  step:
  - 프로젝트 루트가 /home/tree/project/rust-orc/.tmp_tmux_test 인지 확인한다.
  - 최소 파일 구조(index.html, styles.css, script.js, 검증 문서)를 준비한다.
  - 프로젝트 루트에서 실행 가능한 정적 페이지 실행 명령을 정의한다.
  - 프로젝트 루트에서 실행 가능한 tmux split 검증 명령을 정의한다.
  - 명령, 파일명, 실행 순서가 문서와 코드에서 일치하는지 점검한다.
  tasks:
  - pwd로 작업 디렉터리가 /home/tree/project/rust-orc/.tmp_tmux_test인지 확인하고 상대 경로 기준으로 파일 생성 위치를 고정한다.
  - ./index.html에 시맨틱 섹션(헤더, 소개, 핵심 정보, CTA)과 ./styles.css, ./script.js 링크를 작성한다.
  - ./styles.css에 가독성·접근성 우선의 기본 레이아웃과 모바일 대응 규칙을 추가한다.
  - ./script.js에 CTA 또는 네비게이션 중심의 최소 상호작용 로직을 전역 오염 없이 구현한다.
  - ./tmux_split_verification.md에 tmux 세션 생성, pane 분할, pane 역할(서빙/검증), 실행 명령, 성공/실패 기준을 단계형으로 기록한다.
  - 문서의 명령, 파일명, 실행 순서가 실제 파일 구조와 동일한지 교차 점검한다.
  constraints:
  - ./project/project.md는 생성, 수정, 참조하지 않는다.
  - 프로젝트 문서 파일 경로는 ./.project/project.md만 사용한다.
  - 불필요한 프레임워크/패키지 초기화는 수행하지 않는다.
  - 파일 추가는 기능 검증에 필요한 범위로 제한한다.
  - UI는 단일 페이지 랜딩 구조를 유지하고 외부 빌드 도구 의존성을 추가하지 않는다.
  - 검증 명령은 프로젝트 루트(/home/tree/project/rust-orc/.tmp_tmux_test)에서 실행 가능해야 한다.
  check:
  - test "$(pwd)" = "/home/tree/project/rust-orc/.tmp_tmux_test" 실행 결과가 참이다.
  - test -f ./index.html && test -f ./styles.css && test -f ./script.js && test -f ./tmux_split_verification.md가 모두 성공한다.
  - python3 -m http.server 4173 실행 후 브라우저에서 콘솔 에러 없이 랜딩 페이지가 렌더링되고 JavaScript 상호작용이 동작한다.
  - tmux new-session -d -s school_lp, tmux split-window -h -t school_lp, tmux send-keys -t school_lp:0.0 "python3 -m http.server 4173" C-m, tmux send-keys -t school_lp:0.1 "curl -fsS http://127.0.0.1:4173 | rg '<header|<section|<button'" C-m 순서로 실행 시 검증 명령이 성공한다.
  - 검증 종료 후 tmux kill-session -t school_lp가 정상 수행되고 동일 절차 재실행 시 같은 결과가 재현된다.
- name: 'school_landing_page: 헤더/소개/핵심 정보/CTA를 포함한 단일 페이지 시맨틱 HTML 작성, 반응형 CSS 적용, 핵심 상호작용 JavaScript 연결'
  type: action
  domain:
  - app
  depends_on:
  - 'workspace_bootstrap: 루트 경로 확인, 최소 파일 구조(index.html, styles.css, script.js, 검증 문서) 준비, 실행/검증 명령 정의'
  scope:
  - 프로젝트 루트 `/home/tree/project/rust-orc/.tmp_tmux_test`에서 정적 단일 페이지 학교 랜딩 자산(`index.html`, `styles.css`, `script.js`)을 최소 구성으로 구현한다.
  - 랜딩 페이지는 헤더/소개/핵심 정보/CTA 시맨틱 섹션, 반응형 CSS, 핵심 상호작용 JavaScript를 포함하고 외부 라이브러리 없이 브라우저 기본 환경에서 동작하게 한다.
  - tmux 2-pane split 기반으로 서빙 pane/검증 pane 역할을 분리한 재현 가능한 검증 절차를 문서화하고 실행 명령과 파일/순서를 일치시킨다.
  rule:
  - HTML은 헤더, 소개, 핵심 정보, CTA 섹션을 시맨틱 구조로 명확히 구분한다.
  - CSS는 반응형 기본 레이아웃과 가독성/접근성을 우선한다.
  - JavaScript는 핵심 상호작용만 담당하며 전역 오염을 최소화한다.
  - 문서와 코드의 파일명 및 실행 순서는 정의된 검증 절차와 일치해야 한다.
  step:
  - index.html에 학교 랜딩 페이지 단일 페이지 구조(헤더, 소개, 핵심 정보, CTA)를 작성한다.
  - styles.css에 브라우저 기본 환경에서 동작하는 반응형 스타일을 적용한다.
  - script.js에 CTA 등 핵심 사용자 상호작용 로직을 연결한다.
  - 브라우저 콘솔 에러 없이 렌더링 및 상호작용 동작을 확인한다.
  tasks:
  - 루트 경로 유효성을 확인하고 `./project/project.md`는 건드리지 않으며 프로젝트 문서 경로는 `./.project/project.md` 규칙만 따른다.
  - '`index.html`에 학교 랜딩 구조(헤더, 소개, 핵심 정보, CTA)와 `styles.css`, `script.js` 연결을 작성한다.'
  - '`styles.css`에 접근성/가독성 우선의 기본 스타일과 모바일 대응 반응형 규칙을 작성한다.'
  - '`script.js`에 CTA 등 핵심 상호작용만 구현하고 즉시실행 범위 또는 모듈 패턴으로 전역 오염을 최소화한다.'
  - tmux 검증 절차를 단계형으로 정리해 세션 생성, pane 분할, pane별 명령(서빙/검증), 성공/실패 판정 텍스트를 명시한다.
  - 검증 명령을 프로젝트 루트에서 그대로 실행 가능하게 고정하고 반복 실행 가능한 동일 커맨드 시퀀스로 유지한다.
  constraints:
  - 외부 CDN 및 라이브러리를 사용하지 않는다.
  - 외부 빌드 도구 의존성을 추가하지 않는다.
  - 단일 페이지 랜딩 구조를 유지한다.
  - 프로젝트 루트 기준 상대 경로를 일관되게 사용한다.
  check:
  - '`pwd` 출력이 `/home/tree/project/rust-orc/.tmp_tmux_test`인지 확인한다.'
  - '`tmux new-session -d -s school_lp` 후 `tmux split-window -h -t school_lp`로 최소 2-pane 구성을 만든다.'
  - 서빙 pane에서 `python3 -m http.server 4173`를 실행하고 검증 pane에서 `curl -fsS http://127.0.0.1:4173/index.html`로 응답을 확인한다.
  - 검증 pane에서 `rg "<header|소개|핵심 정보|CTA" index.html` 및 `rg "addEventListener" script.js`로 구조/인터랙션 연결을 확인한다.
  - 브라우저에서 페이지 로드 시 콘솔 에러가 없고 CTA 상호작용이 동작하면 성공, HTTP 응답 실패/콘솔 에러/섹션 누락 시 실패로 판정한다.
- name: 'tmux_split_verification: tmux 세션 생성, 2개 pane 분할, pane 역할(서빙/검증) 분리, 반복 가능한 명령 기반 성공/실패 기준 문서화'
  type: action
  domain:
  - app
  depends_on:
  - 'school_landing_page: 헤더/소개/핵심 정보/CTA를 포함한 단일 페이지 시맨틱 HTML 작성, 반응형 CSS 적용, 핵심 상호작용 JavaScript 연결'
  scope:
  - 프로젝트 루트 `/home/tree/project/rust-orc/.tmp_tmux_test` 기준으로 정적 랜딩 페이지 자산(HTML/CSS/JavaScript)과 tmux split 검증 절차를 최소 구성으로 구현한다.
  - 학교 랜딩 페이지는 단일 페이지 구조(헤더, 소개, 핵심 정보, CTA)와 브라우저 기본 환경에서 동작하는 반응형 스타일/상호작용만 포함한다.
  - tmux 2-pane(서빙/검증 역할 분리) 기반으로 동일 명령 재실행이 가능한 성공/실패 판정 절차를 문서화한다.
  rule:
  - 프로젝트 루트(`/home/tree/project/rust-orc/.tmp_tmux_test`)에서 동일 명령으로 반복 실행 가능해야 한다.
  - tmux 2개 pane 분할 상태에서 pane 역할을 서빙/검증으로 명확히 분리해 기술한다.
  - 검증은 수동 추측이 아닌 실행 가능한 명령과 텍스트 기반 성공/실패 기준으로 기록한다.
  - 문서의 명령, 파일명, 실행 순서는 코드/자산 구성과 일치해야 한다.
  step:
  - tmux 세션을 생성하고 대상 프로젝트 루트로 작업 디렉터리를 고정한다.
  - pane을 2개로 분할하고 한 pane은 정적 페이지 서빙, 다른 pane은 검증 명령 실행 역할로 지정한다.
  - 서빙 pane에서 정적 파일 실행 명령을 수행하고 검증 pane에서 HTTP 응답/콘텐츠 확인 명령을 실행한다.
  - 성공/실패 판정 기준을 명령 출력 기준으로 문서화하고 동일 절차 재실행 가능성을 확인한다.
  tasks:
  - 루트 경로 유효성 확인 후 `./index.html`, `./styles.css`, `./script.js`를 생성/수정해 school_landing_page 구조와 동작을 연결한다.
  - '`./index.html`에 시맨틱 섹션(헤더, 소개, 핵심 정보, CTA)을 배치하고 `./styles.css`, `./script.js`를 상대 경로로 연결한다.'
  - '`./styles.css`에 접근성 우선의 가독성 중심 반응형 규칙을 작성하고 외부 의존성 없이 렌더링되도록 구성한다.'
  - '`./script.js`에 핵심 상호작용(CTA 클릭/상태 토글 등)만 구현하고 즉시실행 스코프 또는 모듈 패턴으로 전역 오염을 최소화한다.'
  - '`./tmux_split_verification.md`에 tmux 세션 생성, pane 분할, pane 역할(서빙/검증), 반복 실행 명령, 성공/실패 기준을 루트 기준 상대 경로/명령으로 단계화해 기록한다.'
  constraints:
  - tmux 미설치 환경을 전제로 한 대체 절차를 포함하지 않는다.
  - GUI 수동 조작만으로 성립하는 검증 절차를 사용하지 않는다.
  - 외부 빌드 도구나 추가 패키지 의존성을 도입하지 않는다.
  - 검증 절차는 최소 2개 pane 분할 상태를 전제로 해야 한다.
  check:
  - 프로젝트 루트에서 `tmux new-session -d -s school_lp` -> `tmux split-window -h -t school_lp` 실행으로 2-pane 상태가 재현되는지 확인한다.
  - 서빙 pane에서 `python3 -m http.server 8080` 실행 후 검증 pane에서 `curl -fsS http://127.0.0.1:8080/index.html` 및 `curl -fsS http://127.0.0.1:8080/script.js`가 성공(0 exit)하는지 확인한다.
  - 검증 pane에서 `rg "<header|<section|cta" index.html`와 `rg "addEventListener|querySelector" script.js`로 구조/동작 연결이 존재하는지 확인한다.
  - 브라우저에서 `http://127.0.0.1:8080` 로드 시 콘솔 에러가 없고 CTA 상호작용이 동작하면 성공, 명령 실패/HTTP 실패/콘솔 에러 발생 시 실패로 판정한다.
