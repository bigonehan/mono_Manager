draft:
- name: 프로젝트 루트 작업 디렉터리 유효성 확인 로직 구현
  type: action
  domain:
  - app
  depends_on:
  - set -euo pipefail 적용, 실패 시 즉시 중단
  scope:
  - workspace_bootstrap 액션의 not_initialized -> session_checked 전이 구간에서 프로젝트 루트(/home/tree/project/rust-orc/.tmp_tmux_iso) 작업 디렉터리 유효성 확인 로직을 구현한다.
  - tmux/bash 기반 비대화형 실행 흐름에서 디렉터리 검증 실패 시 즉시 중단하고 최소 로그와 종료 코드를 반환하도록 제한한다.
  - 검증 로직은 재실행 가능하고 동일 입력에서 동일 결과를 보장하도록 고정 경로 기준으로 처리한다.
  rule:
  - 경로 기준은 프로젝트 루트(`/home/tree/project/rust-orc/.tmp_tmux_iso`)를 우선 사용한다.
  - 상태 전이는 순차적으로 진행하며 단계 건너뛰기를 허용하지 않는다.
  - 쉘 스크립트는 bash 기준으로 작성하고 실행 옵션은 `set -euo pipefail`을 유지한다.
  step:
  - 스크립트 시작 시 현재 작업 디렉터리가 프로젝트 루트와 일치하는지 확인한다.
  - 프로젝트 루트 미일치 시 최소 로그를 출력하고 즉시 실패 종료 코드를 반환한다.
  - 프로젝트 루트 일치 시 `session_checked` 이전 단계로 진행 가능 상태를 기록/출력한다.
  tasks:
  - bash 스크립트 시작부에 set -euo pipefail을 적용하고 프로젝트 루트 상수(ROOT_DIR=/home/tree/project/rust-orc/.tmp_tmux_iso)를 선언한다.
  - pwd와 ROOT_DIR 비교 또는 ROOT_DIR 존재/접근 가능 여부 검사로 작업 디렉터리 유효성 체크 함수를 추가한다.
  - 유효성 실패 시 표준 오류로 원인 한 줄 로그를 출력하고 비0 종료 코드로 즉시 종료한다.
  - 유효성 성공 시 session_checked 이전 단계 로그를 출력하고 다음 tmux 세션 검증 단계로만 진행되도록 상태 전이 게이트를 둔다.
  - 프로젝트 외부 파일 생성/수정 없이 기존 스크립트 내부 로직만 최소 변경으로 반영한다.
  constraints:
  - 대화형 입력 없이 비대화형으로 실행되어야 한다.
  - 프로젝트 외부 디렉터리 파일 생성/수정을 수행하지 않는다.
  - 실패 시 즉시 중단하고 원인 파악에 필요한 최소 로그만 남긴다.
  check:
  - 프로젝트 루트에서 스크립트를 실행해 디렉터리 검증 성공 로그와 0 종료 코드를 확인한다.
  - 루트가 아닌 경로에서 동일 스크립트를 실행해 디렉터리 검증 실패 로그와 비0 종료 코드를 확인한다.
  - 실패 케이스에서 tmux split 관련 후속 명령이 호출되지 않았음을 실행 로그로 확인한다.
  - 동일 조건으로 2회 이상 재실행해 성공/실패 결과와 종료 코드가 동일함을 확인한다.
- name: tmux 세션 존재 확인 및 필요 시 생성(중복 생성 방지)
  type: action
  domain:
  - app
  depends_on:
  - 프로젝트 루트 작업 디렉터리 유효성 확인 로직 구현
  scope:
  - workspace_bootstrap 기능으로 tmux 세션 존재 확인, 필요 시 생성, 윈도우/패인 분할, 분할 검증까지 순차 상태 전이를 bash로 구현한다.
  - 구현 경로는 프로젝트 루트(/home/tree/project/rust-orc/.tmp_tmux_iso) 내부 스크립트 중심으로 제한하고 외부 의존 없이 비대화형 재실행 가능하게 유지한다.
  - 검증 기준은 tmux list-sessions/list-windows/list-panes 결과를 사용해 패인 수와 레이아웃 일치 여부를 동시에 판정한다.
  rule:
  - 모든 자동화는 tmux 세션/윈도우/패인 존재 여부를 선검증한 뒤 실행한다.
  - 이미 구성된 세션이 있으면 재사용하고 중복 생성하지 않는다.
  - 상태 전이는 순차적으로 진행하며 단계 건너뛰기를 허용하지 않는다.
  - 상태 판별은 tmux list-sessions 결과를 기준으로 수행한다.
  step:
  - tmux list-sessions로 대상 세션 존재 여부를 확인한다.
  - 세션이 없으면 일관된 이름 규칙으로 tmux new-session을 비대화형으로 실행해 생성한다.
  - 세션이 이미 있으면 생성 단계를 건너뛰고 재사용 경로로 진행한다.
  - 세션 확인/생성 결과를 session_checked 상태로 기록한다.
  tasks:
  - /home/tree/project/rust-orc/.tmp_tmux_iso/scripts/workspace_bootstrap.sh에 set -euo pipefail 기반 실행 진입점과 인자(세션/윈도우 식별 규칙)를 정의한다.
  - 작업 디렉터리 유효성 확인 후 not_initialized에서 session_checked로 전이하는 tmux 세션 조회(list-sessions) 및 필요 시 생성 로직(new-session, 중복 생성 방지)을 구현한다.
  - 대상 윈도우 존재 확인(list-windows)과 분할 적용(split-window)으로 workspace_ready에서 split_configured로 전이하며 tmux 실패 시 1회 이내 재시도를 적용한다.
  - list-panes 기반 패인 개수와 레이아웃 문자열을 검증해 verification_passed 또는 verification_failed로 종료 상태를 확정한다.
  - 각 단계 성공/실패 기준과 종료 코드를 명시적으로 출력하고 실패 시 즉시 중단하며 원인 파악 최소 로그만 남긴다.
  constraints:
  - bash 스크립트는 set -euo pipefail을 유지한다.
  - 실패 시 즉시 중단하고 최소 로그와 종료 코드를 남긴다.
  - tmux 명령 실패 시 재시도는 1회 이내로 제한한다.
  - 프로젝트 외부 디렉터리의 파일 생성/수정을 금지한다.
  check:
  - bash -n /home/tree/project/rust-orc/.tmp_tmux_iso/scripts/workspace_bootstrap.sh로 문법 검증이 통과해야 한다.
  - 동일 입력으로 스크립트를 2회 연속 실행해 세션 중복 생성 없이 동일 패인 수/레이아웃 결과가 유지되어야 한다.
  - tmux list-sessions, tmux list-windows, tmux list-panes 출력으로 상태 전이 순서(session_checked→workspace_ready→split_configured→verification_passed)를 재현 확인해야 한다.
  - 의도적 실패 케이스에서 verification_failed로 종료되고 비0 종료 코드와 최소 실패 로그가 출력되어야 한다.
- name: 대상 윈도우/패인 분할 구성 적용
  type: action
  domain:
  - app
  depends_on:
  - tmux 세션 존재 확인 및 필요 시 생성(중복 생성 방지)
  scope:
  - workspace_bootstrap 액션(대상 윈도우/패인 분할 구성 적용) 구현 경로를 프로젝트 루트(/home/tree/project/rust-orc/.tmp_tmux_iso) 기준 bash 비대화형 스크립트로 한정한다.
  - 상태 전이를 session_checked -> workspace_ready -> split_configured 순서로만 진행하고, verification_failed 조건에서는 분할을 중단한다.
  - 세션/윈도우/패인 존재 검증과 분할 검증 기준을 tmux list-sessions, tmux list-windows, tmux list-panes 출력 기반으로 고정한다.
  rule:
  - 모든 자동화는 tmux 세션/윈도우/패인 존재 여부를 선검증한 뒤 실행한다.
  - 상태 전이는 session_checked 이후 split_configured로 순차 진행한다.
  - 이미 구성된 세션이 있으면 재사용하고 중복 생성하지 않는다.
  step:
  - tmux list-windows와 list-panes로 대상 세션/윈도우 존재를 확인한다.
  - 대상 윈도우에 비대화형 tmux split-window 명령으로 패인 분할을 적용한다.
  - 분할 적용 결과를 split_configured 상태로 판별 가능하게 수집한다.
  tasks:
  - scripts/workspace_bootstrap.sh에 set -euo pipefail을 적용하고 작업 디렉터리 유효성, tmux 세션 존재 확인/생성, 대상 윈도우 선택, split-window 실행 흐름을 순차 구현한다.
  - 세션 재사용 규칙을 반영해 동일 세션명이 있으면 생성 없이 재사용하고, 없을 때만 tmux new-session으로 생성한다.
  - 분할 적용 후 tmux list-panes로 패인 수를 확인하고 tmux list-windows -F '#{window_layout}'로 레이아웃을 수집해 기대값과 동시 검증한다.
  - tmux 명령 실패 시 1회 재시도만 허용하도록 공통 실행 래퍼를 두고, 재시도 이후 실패하면 즉시 종료 코드 비0으로 종료한다.
  - 성공/실패 판정과 종료 코드를 명확히 출력하는 최소 로그 형식을 추가해 재실행 시 동일 입력에 동일 결과가 나오도록 고정한다.
  constraints:
  - bash 스크립트는 set -euo pipefail을 유지한다.
  - tmux 명령 실패 시 재시도는 1회 이내로 제한한다.
  - 프로젝트 루트 외부 디렉터리의 파일 생성/수정은 금지한다.
  - 실패 시 즉시 중단하고 최소 로그와 종료 코드를 남긴다.
  check:
  - bash scripts/workspace_bootstrap.sh <session> <window> 실행 시 세션/윈도우/패인 선검증 로그가 출력되고 종료 코드 0이어야 한다.
  - 동일 입력으로 2회 연속 실행해도 세션 중복 생성 없이 재사용되며 패인 수/레이아웃 검증 결과가 동일해야 한다.
  - 의도적으로 잘못된 대상(없는 윈도우 등)을 입력하면 1회 재시도 후 verification_failed 로그와 함께 비0 종료 코드로 종료해야 한다.
  - tmux list-panes -t <session>:<window> 결과 패인 개수와 tmux list-windows -t <session> 레이아웃이 스크립트 기대값과 모두 일치할 때만 verification_passed로 기록되어야 한다.
- name: tmux list-sessions/list-windows/list-panes 기반 상태 판별 구현
  type: action
  domain:
  - app
  depends_on:
  - 대상 윈도우/패인 분할 구성 적용
  scope:
  - workspace_bootstrap 도메인에서 tmux 상태 판별 흐름(not_initialized -> session_checked -> workspace_ready -> split_configured -> verification_passed|verification_failed) 구현
  - 프로젝트 루트(/home/tree/project/rust-orc/.tmp_tmux_iso) 기준 비대화형 bash 스크립트로 세션/윈도우/패인 검증 및 분할 자동화 구성
  - tmux list-sessions/list-windows/list-panes 출력만으로 상태를 판별하고 재실행 시 동일 입력 동일 결과를 보장하는 검증 로직 적용
  rule:
  - 상태 전이는 not_initialized -> session_checked -> workspace_ready -> split_configured -> verification_passed|verification_failed 순서를 따른다.
  - 상태 판별은 tmux list-sessions, tmux list-windows, tmux list-panes 결과만 사용한다.
  - verification_failed 상태에서는 후속 분할 작업을 수행하지 않는다.
  step:
  - tmux list-sessions 출력으로 대상 세션 존재 여부를 판별해 session_checked 상태를 확정한다.
  - tmux list-windows 출력으로 대상 윈도우 존재 및 활성 상태를 판별해 workspace_ready 상태를 확정한다.
  - tmux list-panes 출력으로 대상 윈도우의 패인 목록을 수집해 split_configured 전제 상태를 확정한다.
  - 각 상태 판별 결과를 성공/실패와 함께 기록하고 다음 단계에서 재사용 가능한 형식으로 반환한다.
  tasks:
  - 'scripts/workspace_bootstrap.sh 작성: set -euo pipefail, 작업 디렉터리 유효성 확인, 실패 시 즉시 중단 및 최소 로그 출력'
  - '세션 검사/생성 로직 구현: tmux has-session 또는 list-sessions 기반 존재 확인 후 없으면 생성, 있으면 재사용, tmux 실패 시 1회 이내 재시도'
  - '윈도우/패인 구성 로직 구현: 대상 세션/윈도우 이름을 입력값 또는 고정 규칙으로 일관 처리하여 split-window 적용'
  - '검증 로직 구현: list-panes로 패인 개수 확인, list-windows로 레이아웃 확인, 둘 다 일치 시 verification_passed 아니면 verification_failed'
  - '종료 코드 정책 구현: 성공 시 0, 검증 실패 또는 명령 실패 시 비0 반환, 단계별 상태/결과 로그를 명시적으로 출력'
  constraints:
  - 구현은 bash 비대화형 실행을 전제로 하며 set -euo pipefail 정책과 충돌하지 않아야 한다.
  - tmux 명령 실패 시 즉시 중단하되 재시도는 최대 1회 이내로 제한한다.
  - 프로젝트 루트 외부 파일 생성/수정 없이 상태 판별과 로그 출력만 수행한다.
  check:
  - bash -n scripts/workspace_bootstrap.sh 구문 검증 통과
  - 비대화형 실행으로 not_initialized부터 verification_passed까지 순차 상태 전이 로그 확인
  - 동일 입력 재실행 시 세션 중복 생성 없이 재사용되고 동일 패인 수/레이아웃 검증 결과가 재현되는지 확인
  - 의도적 불일치 조건에서 verification_failed 발생 및 후속 분할 작업 중단, 비0 종료 코드 반환 확인
  - 모든 파일 변경이 /home/tree/project/rust-orc/.tmp_tmux_iso 내부에만 발생했는지 확인
- name: 패인 수와 레이아웃 일치 여부 검증
  type: action
  domain:
  - app
  depends_on:
  - tmux list-sessions/list-windows/list-panes 기반 상태 판별 구현
  scope:
  - workspace_bootstrap 상태 전이(not_initialized->session_checked->workspace_ready->split_configured->verification_passed|verification_failed)를 bash 스크립트로 구현한다.
  - 프로젝트 루트(/home/tree/project/rust-orc/.tmp_tmux_iso) 내부에서만 동작하는 비대화형 tmux split 검증 흐름을 구현한다.
  - 검증 기준은 패인 수와 레이아웃 동시 일치이며, 실패 시 즉시 중단하고 최소 로그와 종료 코드를 반환한다.
  rule:
  - 검증 기준은 패인 개수와 레이아웃 일치 여부를 모두 포함한다.
  - 상태 판별은 tmux list-sessions, tmux list-windows, tmux list-panes 결과만 사용한다.
  - verification_failed 상태에서는 후속 분할 작업을 수행하지 않는다.
  - 명령 실행 결과는 성공/실패 기준과 종료 코드를 명확히 기록한다.
  step:
  - list-panes 결과에서 대상 윈도우의 패인 개수를 수집한다.
  - list-windows 결과에서 대상 윈도우 레이아웃 값을 수집한다.
  - 기대 패인 수와 실제 패인 수를 비교한다.
  - 기대 레이아웃과 실제 레이아웃을 비교한다.
  - 두 조건이 모두 일치하면 verification_passed 로그와 0 종료 코드를 반환한다.
  - 하나라도 불일치하면 verification_failed 로그와 비0 종료 코드를 반환한다.
  tasks:
  - scripts/workspace_bootstrap.sh를 생성하고 set -euo pipefail, 입력값(session/window 또는 고정 규칙) 초기화, 작업 디렉터리 유효성 검사를 구현한다.
  - tmux list-sessions로 세션 존재를 선검증하고 없으면 생성, 있으면 재사용하도록 구현한다.
  - tmux list-windows와 list-panes 기반으로 대상 윈도우 준비 후 분할을 적용하고 tmux 실패 시 1회 재시도 로직을 추가한다.
  - 분할 적용 후 tmux list-panes로 패인 수를 검증하고 tmux list-windows 포맷으로 레이아웃 일치 여부를 검증한다.
  - 검증 성공 시 verification_passed 로그와 exit 0, 실패 시 verification_failed 로그와 비0 종료 코드를 반환한다.
  - 재실행 시 동일 입력에 동일 결과가 나오도록 중복 생성 방지와 순차 상태 전이 가드를 적용한다.
  constraints:
  - tmux, bash, 표준 shell scripting 범위 내에서만 구현한다.
  - 비대화형 실행으로 동작해야 한다.
  - 실패 시 즉시 중단하고 최소 로그만 남긴다.
  - 동일 입력에서 동일 결과를 보장하도록 재실행 가능해야 한다.
  check:
  - bash -n scripts/workspace_bootstrap.sh
  - bash scripts/workspace_bootstrap.sh
  - tmux list-sessions
  - tmux list-windows -t <session>
  - tmux list-panes -t <session>:<window>
  - 동일 입력으로 스크립트를 2회 연속 실행해 패인 수/레이아웃/종료 코드가 동일한지 확인한다.
- name: 성공/실패 기준 로그 출력 및 종료 코드 반환
  type: action
  domain:
  - app
  depends_on:
  - 패인 수와 레이아웃 일치 여부 검증
  scope:
  - /home/tree/project/rust-orc/.tmp_tmux_iso 기준으로 tmux 세션/윈도우/패인 분할 검증 자동화 경로를 정의한다.
  - workspace_bootstrap 도메인의 순차 상태 전이(not_initialized→session_checked→workspace_ready→split_configured→verification_passed|verification_failed)를 강제한다.
  - 성공/실패 기준 로그 출력과 종료 코드 반환을 비대화형 bash 스크립트(set -euo pipefail)로 구현한다.
  rule:
  - 명령 실행 결과는 성공/실패 기준과 종료 코드를 명확히 기록한다.
  - 검증 로직은 재실행 가능해야 하며 동일 입력에서 동일 결과를 보장한다.
  - 상태 전이는 순차적으로 진행하며 단계 건너뛰기를 허용하지 않는다.
  - verification_failed 상태에서는 후속 분할 작업을 수행하지 않는다.
  step:
  - 검증 결과를 success 또는 failure로 단일 기준에 따라 판정한다.
  - 판정 결과와 핵심 근거를 최소 로그로 출력한다.
  - success 시 0 종료 코드를 반환한다.
  - failure 시 0이 아닌 종료 코드를 반환한다.
  tasks:
  - 프로젝트 루트에 bash 검증 스크립트를 작성하고 작업 디렉터리 유효성, tmux 설치/실행 가능 여부, 대상 세션 존재 여부를 선검증한다.
  - tmux list-sessions 결과로 세션을 확인하고 없으면 1회 생성 시도, 실패 시 1회 재시도 후 verification_failed로 종료한다.
  - 대상 윈도우/패인을 조회(tmux list-windows, list-panes)하여 분할을 적용하고, 기존 구성은 재사용하며 중복 생성하지 않는다.
  - 분할 후 tmux list-panes로 패인 개수와 레이아웃을 함께 검증하고 기준 불일치 시 후속 작업 없이 실패 종료한다.
  - 각 단계에서 성공/실패 로그와 원인 최소 로그를 출력하고 성공 시 0, 실패 시 비0 종료 코드를 반환한다.
  constraints:
  - 대화형 입력 의존 없이 비대화형 실행이 가능해야 한다.
  - 외부 네트워크/외부 서비스 의존 검증을 추가하지 않는다.
  - 프로젝트 외부 디렉터리의 파일 생성/수정은 금지한다.
  - 실패 시 즉시 중단하고 원인 파악에 필요한 최소 로그를 남겨야 한다.
  check:
  - 동일 입력으로 스크립트를 2회 이상 실행해도 세션 재사용과 동일 검증 결과가 재현되는지 확인한다.
  - '성공 케이스: 목표 세션/윈도우에서 패인 개수와 레이아웃이 기대값과 일치하고 종료 코드가 0인지 확인한다.'
  - '실패 케이스: tmux 명령 실패 또는 검증 불일치 시 즉시 중단되고 verification_failed 로그와 비0 종료 코드가 기록되는지 확인한다.'
  - 상태 판별이 tmux list-sessions/list-windows/list-panes 출력만으로 수행되는지 점검한다.
  - 프로젝트 외부 디렉터리 파일 변경이 없고 외부 네트워크/서비스 의존 검증이 추가되지 않았는지 확인한다.
- name: set -euo pipefail 적용, 실패 시 즉시 중단
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - 프로젝트 루트(/home/tree/project/rust-orc/.tmp_tmux_iso)에서 tmux 분할 검증 자동화 스크립트의 bash 실행 안전장치(set -euo pipefail) 적용
  - workspace_bootstrap 도메인 상태 전이(not_initialized→session_checked→workspace_ready→split_configured→verification_passed|verification_failed) 흐름 내 실패 즉시 중단 보장
  - 비대화형 실행, 외부 네트워크 비의존, 프로젝트 외부 파일 미수정 제약 준수
  rule:
  - 쉘 스크립트는 bash 기준으로 작성하고 실행 시작 시 set -euo pipefail을 선언한다.
  - 모든 자동화 단계는 tmux 세션/윈도우/패인 존재 여부 선검증 후 실행한다.
  - 명령 실패 시 즉시 중단하고 성공/실패 기준과 종료 코드를 로그에 명확히 기록한다.
  step:
  - 스크립트 진입부에 set -euo pipefail을 적용한다.
  - 각 검증/분할 명령 실행 전 선행 상태 확인을 수행한다.
  - 실패 지점에서 즉시 종료되도록 에러 전파를 유지하고 최소 원인 로그를 출력한다.
  - 종료 시 성공은 0, 실패는 비0 종료 코드로 반환한다.
  tasks:
  - bash 스크립트 시작부에 set -euo pipefail을 선언하고 누락 시 실패 처리 규칙을 명시
  - 작업 디렉터리 유효성 확인 후 tmux 세션/윈도우/패인 존재를 list-sessions/list-windows/list-panes로 선검증
  - 세션 미존재 시 생성, 기존 세션 존재 시 재사용하여 중복 생성 방지
  - 대상 윈도우/패인 split 적용 전 검증 실패 상태면 즉시 중단하고 후속 분할 작업 차단
  - tmux 명령 실패 시 1회 이내 재시도 후 실패하면 즉시 종료
  - 패인 개수와 레이아웃 일치 여부를 함께 검증하고 성공/실패 로그와 종료 코드를 명확히 출력
  constraints:
  - 비대화형 실행을 유지하고 사용자 입력에 의존하지 않는다.
  - 프로젝트 루트 외부 파일 생성/수정을 하지 않는다.
  - 외부 네트워크 또는 외부 서비스 의존 검증을 추가하지 않는다.
  check:
  - 스크립트 헤더에 set -euo pipefail 존재 여부 확인
  - 의도적 실패 명령 주입 시 즉시 종료되고 후속 tmux split이 실행되지 않는지 확인
  - 동일 입력 재실행 시 세션 중복 생성 없이 동일한 패인 수/레이아웃 검증 결과가 재현되는지 확인
  - 성공 케이스 종료 코드 0, 실패 케이스 비0 및 최소 원인 로그 출력 확인
  - 프로젝트 루트 외부 파일 생성/수정이 없는지 확인
