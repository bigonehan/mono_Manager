draft:
- name: workspace 경로가 /home/tree/project/rust-orc/.tmp_tmux_verify 인지 확인하고 tmux/bash 가용성을 점검한다
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - /home/tree/project/rust-orc/.tmp_tmux_verify 경로 고정으로 tmux 워커 pane 분할 및 출력 전달 검증 자동화 경로를 정의한다.
  - workspace_bootstrap -> tmux_session_control -> worker_output_flow 순서의 재실행 가능한 검증 흐름을 구성한다.
  - 성공/실패 판정은 tmux 세션 상태와 pane 출력 캡처 로그를 근거로 기록한다.
  rule:
  - 모든 검증은 /home/tree/project/rust-orc/.tmp_tmux_verify 경로 기준으로 수행한다.
  - 경로 불일치 시 즉시 실패 처리한다.
  - 필수 도구(tmux, bash) 누락 시 후속 검증을 진행하지 않는다.
  - bootstrap 완료 상태에서만 pane/출력 검증을 실행한다.
  step:
  - 현재 작업 경로가 /home/tree/project/rust-orc/.tmp_tmux_verify 와 일치하는지 확인한다.
  - tmux 바이너리 가용성과 실행 가능 상태를 점검한다.
  - bash 바이너리 가용성과 실행 가능 상태를 점검한다.
  - 점검 결과를 workspace_ready 또는 bootstrap_failed로 판정한다.
  tasks:
  - 현재 작업 경로가 /home/tree/project/rust-orc/.tmp_tmux_verify 와 일치하는지 확인하고 불일치 시 즉시 실패 처리한다.
  - tmux, bash 바이너리 가용성을 확인하고 누락 시 후속 검증 없이 종료한다.
  - 검증 전용 tmux 세션 식별자를 생성 또는 재사용하여 기존 사용자 세션을 침해하지 않게 준비한다.
  - 초기 pane 개수를 수집한 뒤 지정된 방식으로 pane 분할을 수행하고 pane 개수 증가를 검증한다.
  - 대상 pane을 명시적 pane id 또는 index로 선택하고 active pane 및 레이아웃 정보를 수집한다.
  - 선택한 pane에 워커 명령을 전송하여 stdout/stderr가 해당 pane으로 전달되는지 관찰한다.
  - pane 출력 캡처를 수행하고 사전 정의된 키워드 또는 패턴으로 매칭해 output_verified 또는 output_mismatch를 판정한다.
  - 출력 누락 시 재시도 횟수와 타임아웃을 적용하고 무한 대기 없이 종료한다.
  - 실패 원인을 분할 실패, 타깃 pane 지정 실패, 출력 미전달로 구분해 근거 텍스트와 함께 기록한다.
  constraints:
  - tmux와 bash 환경만 사용한다.
  - 프로젝트 범위를 벗어나는 전역 설정 변경을 하지 않는다.
  - 불필요한 리팩터링이나 무관한 파일 변경을 하지 않는다.
  - 자동화 가능한 명령 흐름을 우선하고 수동 조작 의존을 최소화한다.
  check:
  - bootstrap 완료 상태(workspace_ready, dependencies_ready)에서만 pane/출력 검증 단계가 실행된다.
  - tmux 레이아웃, pane index, active pane 정보가 분할 전후로 일관되게 수집되고 세션 식별자가 유지된다.
  - 명령 전송 pane과 출력 캡처 pane이 동일함이 확인된다.
  - stdout/stderr 관찰 결과와 패턴 매칭 결과가 성공/실패 판정 근거로 남는다.
  - 동일 입력 재실행 시 동일 판정 기준으로 결과가 재현된다.
  - 검증은 tmux와 bash만 사용하며 프로젝트 범위 외 전역 설정 변경이 없다.
- name: 검증용 tmux 세션을 생성 또는 재사용하고 pane 분할 전후 개수, 레이아웃, active pane, target pane 지정 상태를 검증한다
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - /home/tree/project/rust-orc/.tmp_tmux_verify 작업 경로에서 tmux 워커 pane 분할 및 출력 전달 검증 자동화 흐름을 정의한다
  - workspace_bootstrap -> worker_pane_split_verification -> worker_output_verification 순서의 재실행 가능한 검증 경로를 확정한다
  - 판정 근거를 tmux 세션 상태(레이아웃, pane index, active pane, target pane)와 pane 출력 로그(stdout/stderr)로 제한한다
  rule:
  - 세션이 없으면 생성 후 검증을 시작한다.
  - pane 분할 이후 pane 개수 증가가 확인되어야 한다.
  - 대상 pane 선택은 명시적 pane id 또는 index 기반으로 수행한다.
  - 검증 중 세션 식별자는 일관되게 유지한다.
  - pane 분할 검증은 tmux 실제 세션 상태(레이아웃, pane index, active pane)를 기준으로 판단한다.
  step:
  - 검증 경로에서 tmux 세션 존재 여부를 확인하고 없으면 검증용 세션을 생성 또는 재사용한다.
  - 분할 전 pane 개수, 레이아웃, active pane 상태를 조회한다.
  - 지정된 방식으로 pane을 분할하고 분할 후 pane 개수 증가를 검증한다.
  - target pane을 명시적으로 지정하고 target 지정 상태와 active pane 상태를 검증한다.
  - 세션 식별자, pane index, 레이아웃, active pane, target pane 결과를 기록한다.
  tasks:
  - 작업 시작 시 현재 경로가 /home/tree/project/rust-orc/.tmp_tmux_verify 인지 확인하고 불일치 시 즉시 실패 처리한다
  - tmux, bash 바이너리 존재를 검사하고 누락 시 bootstrap_failed로 종료한다
  - 검증 전용 tmux 세션 식별자를 고정해 생성 또는 재사용하고 no_session/session_created 상태를 기록한다
  - 분할 전 pane 수, active pane, 레이아웃을 수집한 뒤 지정된 방식으로 pane split을 수행하고 pane 증가 여부로 분할 성공을 판정한다
  - 명시적 pane id 또는 index로 target pane을 선택하고 pane_target_selected 상태를 확인한다
  - 선택된 pane에 워커 명령을 전송해 command_dispatched 상태를 만들고 stdout/stderr를 캡처한다
  - 사전 정의된 출력 패턴으로 output_streaming/output_captured/output_verified 또는 output_mismatch를 판정한다
  - 출력 누락 시 재시도 횟수와 타임아웃을 적용하고 실패 원인을 분할 실패, 타깃 pane 지정 실패, 출력 미전달로 구분 기록한다
  - 검증 정의는 ./.project/project.md 기준으로만 유지하고 ./project/project.md 는 생성/수정/참조하지 않는다
  constraints:
  - tmux와 bash 환경만 사용한다.
  - 기존 사용자 tmux 세션을 파괴하지 않는다.
  - 분할 방식은 검증 시나리오에서 지정한 방식만 사용한다.
  - 프로젝트 범위를 벗어나는 전역 설정 변경을 하지 않는다.
  - 자동화 가능한 명령 흐름으로 재실행 가능해야 한다.
  check:
  - 동일 입력 재실행 시 동일 세션 식별 규칙, 동일 명령 순서, 동일 판정 기준이 적용되는지 확인한다
  - pane split 이후 pane 개수 증가와 레이아웃 변경이 tmux 조회 결과로 관찰되는지 확인한다
  - active pane과 target pane이 의도한 값으로 설정되었는지 tmux pane 목록/포커스 정보로 확인한다
  - 명령 출력이 전송한 동일 pane에서 캡처되고 기대 키워드 패턴과 일치하는지 확인한다
  - stdout/stderr 구분 관찰이 가능하며 무한 대기 없이 타임아웃 종료가 동작하는지 확인한다
  - 실패 결과에 원인 분류와 근거 텍스트가 포함되는지 확인한다
- name: 명령을 target pane으로 전송해 출력이 해당 pane에 표시되는지 캡처하고 기대 패턴으로 성공/실패를 판정한다
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - /home/tree/project/rust-orc/.tmp_tmux_verify 경로에서 tmux 워커 pane 분할 상태와 target pane 출력 전달 경로를 재현 가능하게 검증한다
  - 검증 범위는 workspace_bootstrap, worker_pane_split_verification, worker_output_verification, reproducible_cli_checks로 한정한다
  - tmux_session_control과 worker_output_flow 도메인 규칙에 따라 세션 생성, pane 분할, target 지정, 출력 캡처, 패턴 판정까지 포함한다
  rule:
  - 명령 전송과 출력 캡처는 동일 target pane 기준으로 수행한다
  - 출력 검증은 사전 정의된 기대 키워드 또는 패턴 매칭으로 판정한다
  - 출력 누락 시 재시도 횟수와 타임아웃 기준을 적용한다
  - 검증 결과는 성공/실패와 근거 텍스트를 함께 기록한다
  step:
  - target pane id 또는 index를 확정한다
  - 검증 명령을 target pane으로 전송한다
  - 해당 pane의 출력(표준 출력/표준 오류)을 캡처한다
  - 기대 패턴 매칭으로 성공/실패를 판정한다
  - 판정 근거와 실패 원인(출력 미전달 포함)을 기록한다
  tasks:
  - workspace_bootstrap 단계에서 현재 작업 경로 일치 여부와 tmux/bash 바이너리 존재를 확인하고 실패 시 즉시 종료한다
  - 검증 전용 tmux 세션 식별자를 고정해 생성 또는 재사용하고 초기 pane 수, active pane, layout을 기록한다
  - 지정된 방식으로 pane split을 수행한 뒤 pane 개수 증가와 pane index/id 변화를 확인해 분할 성공 여부를 판정한다
  - 명시적 pane id 또는 index로 target pane을 선택하고 동일 target에 명령을 dispatch한다
  - target pane에서 stdout/stderr를 구분 가능하게 캡처하고 사전 정의된 키워드 패턴 매칭으로 output_verified 또는 output_mismatch를 판정한다
  - 출력 누락 시 제한된 재시도 횟수와 타임아웃을 적용하고 실패 원인을 분할 실패, 타깃 pane 지정 실패, 출력 미전달로 분류 기록한다
  - 동일 입력 재실행 시 동일 판정이 나오도록 명령 순서와 판정 기준을 고정한 CLI 체크 흐름으로 구성한다
  constraints:
  - tmux와 bash 환경만 사용한다
  - 프로젝트 범위를 벗어나는 전역 설정 변경을 하지 않는다
  - 자동화 가능한 명령 흐름을 우선하고 수동 조작 의존을 최소화한다
  - 타임아웃 없는 무한 대기를 허용하지 않는다
  check:
  - 모든 명령이 /home/tree/project/rust-orc/.tmp_tmux_verify 기준에서 실행되었는지 확인한다
  - bootstrap 완료 상태(workspace_ready, dependencies_ready)에서만 pane/출력 검증이 진행되는지 확인한다
  - tmux list-panes 또는 display-message 결과로 pane 수, layout, active pane, target pane 식별 근거가 남는지 확인한다
  - 명령 전송 pane과 출력 캡처 pane이 동일하다는 증거와 기대 패턴 매칭 결과가 함께 기록되는지 확인한다
  - 실패 케이스에서 원인 분류와 근거 텍스트가 명확히 남고 무한 대기 없이 타임아웃 종료되는지 확인한다
  - ./.project/project.md 기준 정의를 유지하고 ./project/project.md 생성/수정/참조가 없는지 확인한다
- name: 실패 시 분할 실패, target pane 지정 실패, 출력 미전달로 원인을 분류해 기록한다
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - /home/tree/project/rust-orc/.tmp_tmux_verify 경로에서 tmux 워커 pane 분할 및 출력 전달 검증 자동화 흐름을 정의한다
  - workspace_bootstrap 완료 이후에만 worker_pane_split_verification 및 worker_output_verification을 수행한다
  - 검증 결과는 실패 원인을 분할 실패, target pane 지정 실패, 출력 미전달로 분류해 재현 가능한 기준으로 기록한다
  rule:
  - 실패 판정은 분할 실패, target pane 지정 실패, 출력 미전달 세 가지로만 분류한다.
  - 원인 분류는 tmux 레이아웃 상태, target pane 식별 결과, pane 출력 캡처 로그를 근거로 기록한다.
  - 성공 또는 실패와 함께 근거 텍스트를 반드시 남긴다.
  step:
  - 검증 실행 결과에서 pane 개수 증가 여부와 레이아웃 정보를 확인해 분할 실패 여부를 먼저 판정한다.
  - target pane id 또는 index 지정 결과를 확인해 타깃 지정 실패 여부를 판정한다.
  - target pane 캡처 출력에서 기대 패턴 존재 여부를 확인해 출력 미전달 여부를 판정한다.
  - 최종 판정 결과를 단일 기록으로 저장하고 재실행 시 동일 기준으로 비교 가능하게 남긴다.
  tasks:
  - 작업 경로가 /home/tree/project/rust-orc/.tmp_tmux_verify 인지 확인하고 tmux/bash 바이너리 존재를 점검해 bootstrap 상태를 판정한다
  - 검증 전용 tmux 세션을 생성 또는 재사용하고 pane 수/레이아웃/active pane을 조회해 초기 상태를 기록한다
  - 지정된 분할 방식으로 pane을 분할한 뒤 pane 개수 증가와 대상 pane 식별(index 또는 id) 성공 여부를 검증한다
  - 대상 pane으로 명령을 전송하고 stdout/stderr 관찰 가능한 방식으로 출력 캡처를 수행한다
  - 사전 정의 패턴으로 출력을 매칭하고 타임아웃 및 재시도 기준을 적용해 성공/실패를 판정한다
  - 실패 시 원인을 분할 실패, target pane 지정 실패, 출력 미전달 중 하나로 분류하고 근거 텍스트를 함께 남긴다
  - 동일 입력으로 재실행 가능한 CLI 검증 순서를 고정해 reproducible_cli_checks를 만족시킨다
  constraints:
  - tmux와 bash 환경만 사용한다.
  - 타임아웃 없는 대기를 허용하지 않는다.
  - 검증 근거는 관찰 가능한 상태와 출력 로그로 제한한다.
  check:
  - 'bootstrap 체크: 경로 불일치 또는 tmux/bash 누락 시 즉시 실패하고 후속 단계를 실행하지 않는다'
  - 'pane 분할 체크: 분할 전후 pane 개수 변화, 레이아웃 값, active pane, target pane 식별 결과가 일관적으로 확인된다'
  - '출력 전달 체크: 명령 전송 pane과 출력 캡처 pane이 동일하며 기대 패턴이 타임아웃 내 검출된다'
  - '실패 분류 체크: 실패 건마다 분할 실패/target pane 지정 실패/출력 미전달 중 단일 원인으로 판정 근거가 기록된다'
  - '범위 체크: tmux와 bash만 사용하고 전역 설정 변경 없이 /home/tree/project/rust-orc/.tmp_tmux_verify 범위 내 검증으로 완료된다'
- name: 동일 입력으로 재실행 가능한 명령 순서를 고정하고 타임아웃/재시도 기준을 적용한다
  type: action
  domain:
  - app
  depends_on: []
  scope:
